<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel BOM Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ── THEMES ─────────────────────────────────────────────── */
:root[data-theme="dark"] {
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --surface3:#30363d;
  --border:#30363d; --border2:#3d444d;
  --text:#e6edf3; --text2:#8d96a0; --text3:#656d76;
  --green:#3fb950; --green-bg:rgba(63,185,80,.1);
  --blue:#58a6ff;  --blue-bg:rgba(88,166,255,.1);
  --amber:#e3b341; --amber-bg:rgba(227,179,65,.1);
  --red:#f85149;   --red-bg:rgba(248,81,73,.1);
  --purple:#bc8cff;
  --shadow:0 1px 4px rgba(0,0,0,.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
}
:root[data-theme="light"] {
  --bg:#f6f8fa; --surface:#fff; --surface2:#f6f8fa; --surface3:#eaeef2;
  --border:#d0d7de; --border2:#bbc1c9;
  --text:#1f2328; --text2:#636c76; --text3:#9198a1;
  --green:#1a7f37; --green-bg:rgba(26,127,55,.08);
  --blue:#0969da;  --blue-bg:rgba(9,105,218,.08);
  --amber:#9a6700; --amber-bg:rgba(154,103,0,.08);
  --red:#d1242f;   --red-bg:rgba(209,36,47,.08);
  --purple:#8250df;
  --shadow:0 1px 3px rgba(0,0,0,.12);
  --shadow-lg:0 8px 24px rgba(0,0,0,.15);
}
:root[data-theme="warm"] {
  --bg:#faf7f2; --surface:#fff; --surface2:#fdf9f4; --surface3:#f2ece2;
  --border:#e2d9cc; --border2:#ccc0b0;
  --text:#2c1f12; --text2:#6b5344; --text3:#a08878;
  --green:#5a7a3a; --green-bg:rgba(90,122,58,.1);
  --blue:#4a6fa5;  --blue-bg:rgba(74,111,165,.1);
  --amber:#b07820; --amber-bg:rgba(176,120,32,.1);
  --red:#b84040;   --red-bg:rgba(184,64,64,.1);
  --purple:#7060a0;
  --shadow:0 1px 3px rgba(100,70,40,.15);
  --shadow-lg:0 8px 24px rgba(100,70,40,.2);
}

/* ── RESET ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:13.5px;line-height:1.5;transition:background .25s,color .25s;
}

/* ── APP SHELL ──────────────────────────────────────────── */
.app-hdr{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  z-index:1000;box-shadow:var(--shadow);
}
.app-main{padding-top:52px;min-height:100vh}
.page-inner{max-width:1400px;margin:0 auto;padding:20px 18px}

/* ── LOGO ───────────────────────────────────────────────── */
.logo{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;
  color:var(--text);letter-spacing:.6px;font-family:monospace;white-space:nowrap}
.logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}

/* ── TAB NAV ────────────────────────────────────────────── */
.tab-nav{display:flex;gap:2px}
.tab-btn{
  padding:5px 13px;border-radius:6px;font-size:12.5px;font-weight:500;
  border:none;background:transparent;cursor:pointer;color:var(--text3);
  transition:all .15s;font-family:inherit;
}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.tab-btn:hover:not(.active){color:var(--text2);background:var(--surface3)}

/* ── HEADER RIGHT ───────────────────────────────────────── */
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.spacer{flex:1}

/* ── DB BADGE ───────────────────────────────────────────── */
.db-badge{
  display:flex;align-items:center;gap:6px;
  padding:3px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;font-size:11.5px;color:var(--text2);max-width:200px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.db-dot.busy{background:var(--amber);animation:pulse .6s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.3}}

/* ── THEME GROUP ────────────────────────────────────────── */
.theme-group{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.theme-btn{padding:4px 9px;border:none;background:transparent;cursor:pointer;font-size:11.5px;
  color:var(--text3);transition:all .15s;font-family:inherit}
.theme-btn.active{background:var(--surface3);color:var(--text)}
.theme-btn:hover:not(.active){color:var(--text2)}

/* ── BUTTONS ────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:6px;border:1px solid transparent;
  cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500;
  transition:all .15s;white-space:nowrap;
}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-primary{background:var(--green);color:#0d1117;border-color:var(--green)}
[data-theme="light"] .btn-primary,[data-theme="warm"] .btn-primary{color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text2);border-color:var(--border)}
.btn-secondary:hover{color:var(--text);border-color:var(--text3);background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text3);border-color:transparent}
.btn-ghost:hover{background:var(--surface2);color:var(--text2)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-bg)}
.btn-danger:hover{opacity:.85}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* ── PIN SCREEN ─────────────────────────────────────────── */
.pin-card{
  text-align:center;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:48px 40px;box-shadow:var(--shadow-lg);min-width:280px;
}
.pin-icon{font-size:44px;margin-bottom:16px}
.pin-card h2{font-size:20px;font-weight:700;margin-bottom:4px}
.pin-card > p{font-size:12.5px;color:var(--text3);margin-bottom:28px}
.pin-inputs{display:flex;gap:12px;justify-content:center}
.pin-digit{
  width:52px;height:60px;text-align:center;font-size:24px;font-weight:700;
  background:var(--surface2);border:2px solid var(--border);border-radius:10px;
  color:var(--text);font-family:monospace;transition:border .15s;outline:none;
}
.pin-digit:focus{border-color:var(--blue)}
.pin-digit.filled{border-color:var(--green)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.pin-inputs.shake{animation:shake .4s ease}

/* ── SETUP / EMPTY STATE ────────────────────────────────── */
.page-empty{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 52px);padding:40px 20px;
}
.setup-card{
  text-align:center;width:100%;max-width:460px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:40px 36px;box-shadow:var(--shadow-lg);
}
.setup-icon{font-size:44px;margin-bottom:16px;line-height:1}
.setup-card h2{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-card > p{font-size:12.5px;color:var(--text3);margin-bottom:24px;line-height:1.6}
.setup-fields{text-align:left;display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.setup-hint{
  font-size:11px;color:var(--text3);margin-top:16px;
  padding:10px 14px;background:var(--surface2);border-radius:8px;
  border:1px solid var(--border);text-align:left;line-height:1.8;
}
.setup-hint a{color:var(--blue);cursor:pointer;text-decoration:none}
.setup-hint a:hover{text-decoration:underline}
.setup-hint code{
  font-family:monospace;font-size:10.5px;
  background:var(--surface3);padding:1px 5px;border-radius:3px;color:var(--text2);
}

/* ── TAB CONTENT ────────────────────────────────────────── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── STATS GRID ─────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.stat-label{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:5px}
.stat-value{font-size:22px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.2}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stat-card.highlight .stat-value{color:var(--green)}
.stat-card.warn .stat-value{color:var(--amber)}

/* ── DASH GRID ──────────────────────────────────────────── */
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.dash-row{grid-template-columns:1fr}}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.dash-card-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:12px}

/* ── MINI TABLE ─────────────────────────────────────────── */
.mini-table{width:100%;border-collapse:collapse;font-size:12.5px}
.mini-table tr:hover td{background:var(--surface2)}
.mini-table td{padding:5px 6px;vertical-align:middle}
.mini-table .mt-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px;color:var(--text)}
.mini-table .mt-sub{text-align:right;font-size:11px;color:var(--text3);white-space:nowrap;padding-left:8px}

/* ── TOOLBAR ────────────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.search-input{
  flex:1;min-width:180px;max-width:280px;padding:6px 11px;
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:12.5px;font-family:inherit;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{outline:none;border-color:var(--blue)}
.filter-sel{
  padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;
}
.filter-sel:focus{outline:none;border-color:var(--blue)}
.count-badge{font-size:11.5px;color:var(--text3)}

/* ── TABLE ──────────────────────────────────────────────── */
.table-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:auto;max-height:calc(100vh - 220px);
}
.data-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
.data-table th{
  position:sticky;top:0;background:var(--surface2);
  padding:8px 11px;text-align:left;font-weight:600;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text3);
  border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;
}
.data-table th:hover{color:var(--text2)}
.data-table th.sorted-asc,.data-table th.sorted-desc{color:var(--blue)}
.sort-arrow{margin-left:3px;font-size:10px}
.data-table td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--surface2)}

/* column widths */
.col-chk{width:34px;text-align:center}
.col-sel{width:30px;text-align:center}
.col-num{width:38px;text-align:right}
.col-src{width:110px}
.col-qty{width:46px;text-align:right}
.col-price{width:70px;text-align:right;font-variant-numeric:tabular-nums}
.col-total{width:72px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.col-buy{width:126px}
.col-crit{width:50px;text-align:center}
.col-act{width:72px;text-align:right}
.col-desc{min-width:200px}
td.col-num,td.col-qty,td.col-price,td.col-total{text-align:right;font-variant-numeric:tabular-nums}

/* ── MARK PURCHASED BUTTON ──────────────────────────────── */
.cb-buy{
  width:24px;height:24px;border:1.5px solid var(--border2);border-radius:5px;
  background:transparent;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;transition:all .12s;flex-shrink:0;font-size:12px;opacity:.55;
}
.cb-buy:hover{opacity:1;border-color:var(--blue);background:var(--blue-bg)}

/* ── SOURCE PILL ────────────────────────────────────────── */
.source-pill{font-size:10.5px;padding:1px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);white-space:nowrap;display:inline-block}
.crit-badge{font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.2px}

/* ── ROW ACTIONS ────────────────────────────────────────── */
.row-actions{display:flex;gap:3px;justify-content:flex-end}
.btn-icon{
  width:27px;height:27px;border:1px solid var(--border);border-radius:5px;
  background:transparent;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;font-size:12px;color:var(--text3);transition:all .15s;
}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.del:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* ── BUY BUTTONS ────────────────────────────────────────── */
.buy-btn{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap;text-decoration:none;border:1px solid transparent;transition:opacity .15s}
a.buy-btn:hover{opacity:.78;text-decoration:none}
.buy-btn.green {background:var(--green-bg); color:var(--green); border-color:var(--green-bg)}
.buy-btn.teal  {background:var(--blue-bg);  color:var(--blue);  border-color:var(--blue-bg)}
.buy-btn.slate {background:var(--surface2); color:var(--text2); border-color:var(--border)}
.buy-btn.red   {background:var(--red-bg);   color:var(--red);   border-color:var(--red-bg)}
.buy-btn.purple{background:var(--surface2); color:var(--purple);border-color:var(--border)}
.buy-btn.grey  {background:var(--surface2); color:var(--text3); border-color:var(--border)}
.buy-btn.navy  {background:var(--blue-bg);  color:var(--blue);  border-color:var(--blue-bg)}
.buy-btn.amber {background:var(--amber-bg); color:var(--amber); border-color:var(--amber-bg)}

/* ── TABLE FOOTER ───────────────────────────────────────── */
.tbl-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;font-size:12px;color:var(--text3);flex-wrap:wrap;gap:6px}
.tbl-footer strong{color:var(--text2)}

/* ── MODALS ─────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── FORM ───────────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span2{grid-column:1/-1}
.modal.inventory-mode .wishlist-only{display:none}
.form-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;transition:border .15s;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue)}
.form-textarea{resize:vertical;min-height:65px}
.form-check{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--text2)}
.form-check input{width:15px;height:15px;cursor:pointer;accent-color:var(--green)}

/* ── REPORTS ────────────────────────────────────────────── */
.rpt-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.rpt-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.rpt-title{font-size:15px;font-weight:700;margin-bottom:4px}
.rpt-date{font-size:11px;color:var(--text3);margin-bottom:16px}
.rpt-group{margin-bottom:24px}
.rpt-group-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;padding:6px 10px;background:var(--surface2);border-radius:6px}
.rpt-table{width:100%;border-collapse:collapse;font-size:12.5px}
.rpt-table th{padding:7px 10px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)}
.rpt-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.rpt-table tbody tr:last-child td{border-bottom:none}
.rpt-table tbody tr:hover td{background:var(--surface2)}
.rpt-table .td-num{text-align:right;font-variant-numeric:tabular-nums}
.rpt-subtotal td{border-top:1px solid var(--border);background:var(--surface2)!important}
.rpt-grand{margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:7px;font-size:13px;color:var(--text2)}
.rpt-grand strong{color:var(--text)}

/* ── INLINE EMPTY ───────────────────────────────────────── */
.inline-empty{text-align:center;padding:50px 20px;color:var(--text3)}
.inline-empty .icon{font-size:32px;margin-bottom:8px}
.inline-empty p{font-size:12.5px}

/* ── LOADING SPINNER ────────────────────────────────────── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ──────────────────────────────────────────────── */
.toast-stack{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{padding:10px 15px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;color:var(--text);font-size:12.5px;box-shadow:var(--shadow-lg);animation:toastIn .2s ease;min-width:200px}
.toast.red{border-left-color:var(--red)}
.toast.amber{border-left-color:var(--amber)}
@keyframes toastIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

/* ── PRINT ──────────────────────────────────────────────── */
@media print{
  .app-hdr,.rpt-actions,.btn,.btn-icon,.row-actions{display:none!important}
  .rpt-section{border:1px solid #ccc;page-break-inside:avoid}
  body{background:#fff;color:#000}
}
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header class="app-hdr">
  <div class="logo"><div class="logo-dot"></div>PADEL BOM</div>

  <nav class="tab-nav" id="tabNav" style="display:none">
    <button class="tab-btn active" id="tbtn-dashboard" onclick="setTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" id="tbtn-items"   onclick="setTab('items')">📋 Items</button>
    <button class="tab-btn" id="tbtn-reports" onclick="setTab('reports')">📄 Reports</button>
    <button class="tab-btn" id="tbtn-inventory" onclick="setTab('inventory')">📦 Inventory</button>
    <button class="tab-btn" id="tbtn-trash" onclick="setTab('trash')">🗑 Trash</button>
  </nav>

  <div class="hdr-right">
    <div class="db-badge" id="dbBadge" style="display:none">
      <div class="db-dot" id="dbDot"></div>
      <span id="dbLabel">—</span>
    </div>
    <div class="theme-group">
      <button class="theme-btn active" data-theme="dark"  onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn"        data-theme="light" onclick="setTheme('light')">Light</button>
      <button class="theme-btn"        data-theme="warm"  onclick="setTheme('warm')">Warm</button>
    </div>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────── -->
<main class="app-main">

<!-- PIN ──────────────────────────────────────────────── -->
<div id="pinState" class="page-empty">
  <div class="pin-card">
    <div class="pin-icon">🔐</div>
    <h2>Enter PIN</h2>
    <p>4-digit access PIN</p>
    <div class="pin-inputs" id="pinInputs">
      <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]">

function setupPinInputs() {
  const digits = Array.from(document.querySelectorAll('.pin-digit'));
  digits.forEach((el, i) => {
    el.addEventListener('input', () => {
      el.value = el.value.replace(/\D/g, '').slice(-1);
      el.classList.toggle('filled', el.value !== '');
      if (el.value && i < digits.length - 1) digits[i + 1].focus();
      if (digits.every(d => d.value)) {
        const entered = digits.map(d => d.value).join('');
        if (entered === PIN) {
          sessionStorage.setItem('bom-pin-ok', '1');
          document.getElementById('pinState').style.display = 'none';
          doConnect();
        } else {
          const wrap = document.getElementById('pinInputs');
          wrap.classList.add('shake');
          document.getElementById('pinErr').textContent = 'Incorrect PIN';
          setTimeout(() => {
            wrap.classList.remove('shake');
            digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
            document.getElementById('pinErr').textContent = '';
            digits[0].focus();
          }, 500);
        }
      }
    });
    el.addEventListener('keydown', ev => {
      if (ev.key === 'Backspace' && !el.value && i > 0) digits[i - 1].focus();
    });
  });
  digits[0].focus();
}

async function connect(url, key, silent = false) {
  url = url || document.getElementById('sbUrl').value.trim();
  key = key || document.getElementById('sbKey').value.trim();
  if (!url || !key) { toast('Enter URL and key', 'amber'); return; }

  const btn = document.getElementById('connectBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Connecting…'; }

  try {
    sb = supabase.createClient(url, key);
    const { error } = await sb.from('bom_items').select('id', { count: 'exact', head: true });
    if (error) throw error;

    localStorage.setItem('bom-sb-url', url);
    localStorage.setItem('bom-sb-key', key);

    await loadItems();
    showApp(url);
    if (!silent) toast('Connected to Supabase');
  } catch (err) {
    toast('Connection failed: ' + err.message, 'red');
    if (btn) { btn.disabled = false; btn.textContent = 'Connect'; }
  }
}

function disconnect() {
  sb = null; rows = []; invRows = []; delRows = []; selectedWishlist = new Set();
  localStorage.removeItem('bom-sb-url');
  localStorage.removeItem('bom-sb-key');
  document.getElementById('pinState').style.display     = 'flex';
  document.getElementById('tabNav').style.display       = 'none';
  document.getElementById('dbBadge').style.display      = 'none';
  document.getElementById('importBtn').style.display    = 'none';
  document.getElementById('disconnectBtn').style.display = 'none';
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
}

/* ═══════════════════════════════════════════════════════
   SUPABASE — LOAD
═══════════════════════════════════════════════════════ */
async function loadItems() {
  setBusy(true);
  const [wish, inv, trash] = await Promise.all([
    sb.from('bom_items').select('*').order('pos').order('id'),
    sb.from('inventory').select('*').order('id'),
    sb.from('deleted_items').select('*').order('deleted_at', { ascending: false }),
  ]);
  setBusy(false);
  if (wish.error)  { toast('Load failed: ' + wish.error.message, 'red'); return; }
  if (inv.error)   { toast('Load failed: ' + inv.error.message, 'red'); return; }
  if (trash.error) { toast('Load failed: ' + trash.error.message, 'red'); return; }
  rows    = wish.data  || [];
  invRows = inv.data   || [];
  delRows = trash.data || [];
  for (const id of [...selectedWishlist]) if (!rows.some(r => r.id === id)) selectedWishlist.delete(id);
  populateFilters();
  renderItems();
  renderDashboard();
  renderInventory();
  renderTrash();
}

/* ═══════════════════════════════════════════════════════
   SUPABASE — CRUD (wishlist)
═══════════════════════════════════════════════════════ */
async function dbInsert(payload) {
  const maxPos = rows.length ? Math.max(...rows.map(r => r.pos || 0)) : 0;
  const { error } = await sb.from('bom_items').insert({ ...payload, pos: maxPos + 1 });
  if (error) throw error;
}

async function dbUpdate(id, payload) {
  const { error } = await sb.from('bom_items').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) throw error;
}

async function dbDelete(id) {
  const r = rows.find(r => r.id === id);
  if (r) await archiveDeleted(r, 'wishlist');
  const { error } = await sb.from('bom_items').delete().eq('id', id);
  if (error) throw error;
}

/* ═══════════════════════════════════════════════════════
   SUPABASE — CRUD (inventory)
═══════════════════════════════════════════════════════ */
async function invInsert(payload) {
  const { data, error } = await sb.from('inventory').insert(payload).select().single();
  if (error) throw error;
  return data;
}

async function invUpdate(id, payload) {
  const { error } = await sb.from('inventory').update({ ...payload, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) throw error;
}

async function invDelete(id) {
  const r = invRows.find(r => r.id === id);
  if (r) await archiveDeleted(r, 'inventory');
  const { error } = await sb.from('inventory').delete().eq('id', id);
  if (error) throw error;
}

/* ═══════════════════════════════════════════════════════
   SUPABASE — TRASH ARCHIVE
   every delete copies the row into deleted_items first,
   so nothing is ever permanently lost by accident
═══════════════════════════════════════════════════════ */
async function archiveDeleted(row, sourceTable) {
  const { error } = await sb.from('deleted_items').insert({
    source_table: sourceTable,
    original_id:  row.id,
    name:      row.name,
    category:  row.category,
    source:    row.source,
    qty:       row.qty,
    price:     row.price,
    notes:     row.notes,
    critical:  row.critical ?? null,
    buy_url:   row.buy_url ?? null,
    buy_label: row.buy_label ?? null,
  });
  if (error) throw error;
}

async function restoreItem(id) {
  const r = delRows.find(x => x.id === id); if (!r) return;
  const dest = r.source_table === 'inventory' ? 'inventory' : 'wishlist';
  if (!confirm(`Restore "${r.name}" to your ${dest === 'inventory' ? 'inventory' : 'wishlist'}?`)) return;
  try {
    const base = { name: r.name, category: r.category, source: r.source, qty: r.qty, price: r.price, notes: r.notes };
    if (dest === 'inventory') await invInsert(base);
    else await dbInsert({ ...base, critical: r.critical || false, buy_url: r.buy_url || '', buy_label: r.buy_label || '' });
    const { error } = await sb.from('deleted_items').delete().eq('id', id);
    if (error) throw error;
    toast('Item restored ↩');
    await loadItems();
  } catch (err) {
    toast('Restore failed: ' + err.message, 'red');
  }
}

async function purgeItem(id) {
  if (!confirm('Permanently delete this item? This cannot be undone.')) return;
  try {
    const { error } = await sb.from('deleted_items').delete().eq('id', id);
    if (error) throw error;
    toast('Permanently deleted', 'red');
    await loadItems();
  } catch (err) {
    toast('Delete failed: ' + err.message, 'red');
  }
}

/* ═══════════════════════════════════════════════════════
   MARK PURCHASED — moves a wishlist item into inventory,
   merging quantities with a matching item if one exists
═══════════════════════════════════════════════════════ */
function findInventoryMatch(name) {
  const key = (name||'').trim().toLowerCase();
  if (!key) return null;
  return invRows.find(x => (x.name||'').trim().toLowerCase() === key) || null;
}

async function markPurchased(id) {
  const r = rows.find(r=>r.id===id); if(!r) return;
  if (!confirm(`Mark "${r.name}" as purchased?\nIt will move from your wishlist into your inventory.`)) return;

  try {
    const match = findInventoryMatch(r.name);
    if (match) {
      await invUpdate(match.id, { qty: (match.qty||0) + (r.qty||0) });
    } else {
      await invInsert({
        name: r.name, category: r.category,
        source: r.source, qty: r.qty, price: r.price, notes: r.notes,
      });
    }
    await dbDelete(r.id);
    toast('Moved to inventory 📦');
    await loadItems();
  } catch(err) {
    toast('Move failed: '+err.message, 'red');
  }
}

/* ═══════════════════════════════════════════════════════
   BULK MOVE — move every selected wishlist row into
   inventory in one go, merging quantities along the way
═══════════════════════════════════════════════════════ */
function toggleSelectRow(id, checked) {
  if (checked) selectedWishlist.add(id); else selectedWishlist.delete(id);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  selectedWishlist = checked ? new Set(rows.map(r => r.id)) : new Set();
  renderItems();
}

function updateBulkBar() {
  const btn = document.getElementById('bulkMoveBtn');
  if (!btn) return;
  btn.style.display = selectedWishlist.size ? 'inline-flex' : 'none';
  btn.textContent = `📦 Move ${selectedWishlist.size} to Inventory`;
  const all = document.getElementById('selectAllChk');
  if (all) all.checked = rows.length > 0 && selectedWishlist.size === rows.length;
}

async function bulkMoveToInventory() {
  const ids = [...selectedWishlist];
  if (!ids.length) return;
  if (!confirm(`Move ${ids.length} item(s) from your wishlist into your inventory?`)) return;

  try {
    const working = invRows.map(r => ({ id: r.id, name: r.name, qty: r.qty }));
    let moved = 0;
    for (const id of ids) {
      const r = rows.find(x => x.id === id); if (!r) continue;
      const key = (r.name||'').trim().toLowerCase();
      const match = working.find(x => (x.name||'').trim().toLowerCase() === key);
      if (match) {
        const newQty = (match.qty||0) + (r.qty||0);
        await invUpdate(match.id, { qty: newQty });
        match.qty = newQty;
      } else {
        const created = await invInsert({
          name: r.name, category: r.category,
          source: r.source, qty: r.qty, price: r.price, notes: r.notes,
        });
        working.push({ id: created.id, name: created.name, qty: created.qty });
      }
      await dbDelete(r.id);
      moved++;
    }
    selectedWishlist.clear();
    toast(`Moved ${moved} item${moved!==1?'s':''} to inventory 📦`);
    await loadItems();
  } catch(err) {
    toast('Bulk move failed: '+err.message, 'red');
  }
}

/* ═══════════════════════════════════════════════════════
   SHOW APP
═══════════════════════════════════════════════════════ */
function showApp(url) {
  document.getElementById('pinState').style.display      = 'none';
  document.getElementById('tabNav').style.display        = 'flex';
  document.getElementById('dbBadge').style.display = 'flex';

  const host = url ? (url.replace('https://','').split('.')[0] || url) : '?';
  document.getElementById('dbLabel').textContent = host.length > 18 ? host.slice(0,16)+'…' : host;

  setTab('dashboard');
}

function setBusy(on) {
  document.getElementById('dbDot')?.classList.toggle('busy', on);
}

/* ═══════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════ */
function setTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tbtn-' + name).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'items')     renderItems();
  if (name === 'inventory') renderInventory();
  if (name === 'trash')     renderTrash();
}

/* ═══════════════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════════════ */
function populateFilters() {
  const cats = [...new Set(rows.map(r => r.category).filter(Boolean))].sort();
  const catOpts = '<option value="">All Categories</option>' +
    cats.map(c => `<option value="${e(c)}">${c}</option>`).join('');
  document.getElementById('fCat').innerHTML = catOpts;
  document.getElementById('iCat').innerHTML = catOpts;

  document.getElementById('catDatalist').innerHTML = cats.map(c => `<option value="${e(c)}">`).join('');

  const srcOpts = '<option value="">All Sources</option>' +
    SOURCE_GROUPS.filter(g => rows.some(r => g.match(r.source || '')))
      .map(g => `<option value="${g.value}">${g.label}</option>`).join('');
  document.getElementById('fSource').innerHTML = srcOpts;
  document.getElementById('iSource').innerHTML = srcOpts;
}

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function renderDashboard() {
  // combine wishlist (still need) + inventory (already have) into one view
  const all   = [...rows.map(r => ({...r, bought:false})), ...invRows.map(r => ({...r, bought:true}))];
  const bought = all.filter(r => r.bought);
  const total  = all.reduce((s, r) => s + (r.qty||0) * (r.price||0), 0);
  const spent  = bought.reduce((s, r) => s + (r.qty||0) * (r.price||0), 0);
  const crit   = rows.filter(r => r.critical).length;
  const pct    = all.length ? Math.round(bought.length / all.length * 100) : 0;

  document.getElementById('statsGrid').innerHTML = [
    ['TOTAL ITEMS',    all.length,                           pct + '% purchased', ''],
    ['TOTAL COST',     'LE ' + total.toLocaleString(),       '',                  ''],
    ['PURCHASED',      bought.length + ' / ' + all.length,  pct + '% done',      pct === 100 ? 'highlight' : ''],
    ['REMAINING COST', 'LE ' + (total-spent).toLocaleString(), '',                ''],
    ['CRITICAL LEFT',  crit, crit ? '⚠ needs attention' : '✓ all covered',       crit ? 'warn' : ''],
  ].map(([label, val, sub, cls]) => `
    <div class="stat-card ${cls}">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${val}</div>
      ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
    </div>`).join('');

  const catG = {};
  all.forEach(r => { const k = r.category || '—'; if(!catG[k]) catG[k]=[]; catG[k].push(r); });
  document.getElementById('dashCat').innerHTML = `<table class="mini-table">
    ${Object.entries(catG).map(([cat,its]) => {
      const ct = its.reduce((s,i) => s+(i.qty||0)*(i.price||0), 0);
      const pb = its.filter(i=>i.bought).length;
      return `<tr>
        <td style="font-size:15px;width:22px">${[...cat][0]||'·'}</td>
        <td style="color:var(--text2);font-size:12px;max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${cat.replace(/^.\s*/,'').replace(/&/g,'&amp;')}</td>
        <td class="mt-sub">${pb}/${its.length}</td>
        <td class="mt-num">${ct.toLocaleString()} LE</td>
      </tr>`;
    }).join('')}
  </table>`;

  const storeG = {};
  all.forEach(r => {
    const g = SOURCE_GROUPS.find(g => g.match(r.source||''));
    const k = g ? g.label : '🏠 External';
    if(!storeG[k]) storeG[k]={n:0,cost:0};
    storeG[k].n++; storeG[k].cost += (r.qty||0)*(r.price||0);
  });
  document.getElementById('dashStore').innerHTML = `<table class="mini-table">
    ${Object.entries(storeG).map(([s,{n,cost}]) => `
      <tr>
        <td style="color:var(--text2);font-size:12px">${s}</td>
        <td class="mt-sub">${n} item${n!==1?'s':''}</td>
        <td class="mt-num">${cost.toLocaleString()} LE</td>
      </tr>`).join('')}
  </table>`;
}

/* ═══════════════════════════════════════════════════════
   ITEMS TABLE
═══════════════════════════════════════════════════════ */
function renderItems() {
  const search = (document.getElementById('fSearch')?.value||'').toLowerCase();
  const fCat   = document.getElementById('fCat')?.value || '';
  const fSrc   = document.getElementById('fSource')?.value || '';
  const fStat  = document.getElementById('fStatus')?.value || '';

  let items = rows.map((r, i) => ({...r, _idx: i}));
  if (search) items = items.filter(r =>
    (r.name||'').toLowerCase().includes(search) ||
    (r.notes||'').toLowerCase().includes(search) ||
    (r.source||'').toLowerCase().includes(search));
  if (fCat)  items = items.filter(r => r.category === fCat);
  if (fSrc)  { const g = SOURCE_GROUPS.find(g=>g.value===fSrc); if(g) items=items.filter(r=>g.match(r.source||'')); }
  if (fStat === 'critical') items = items.filter(r => r.critical);

  if (sortCol) {
    items.sort((a, b) => {
      let av, bv;
      if      (sortCol==='pos')    { av=a.pos||0;        bv=b.pos||0; }
      else if (sortCol==='name')   { av=a.name||'';      bv=b.name||''; }
      else if (sortCol==='source') { av=a.source||'';    bv=b.source||''; }
      else if (sortCol==='qty')    { av=a.qty||0;        bv=b.qty||0; }
      else if (sortCol==='price')  { av=a.price||0;      bv=b.price||0; }
      else if (sortCol==='total')  { av=(a.qty||0)*(a.price||0); bv=(b.qty||0)*(b.price||0); }
      if (typeof av==='string') return sortDir*av.localeCompare(bv);
      return sortDir*(av-bv);
    });
  }

  document.getElementById('countBadge').textContent =
    items.length===rows.length ? `${items.length} items` : `${items.length} of ${rows.length}`;

  let n=0;
  document.getElementById('tableBody').innerHTML = items.map(r => {
    n++;
    return `<tr>
      <td class="col-sel"><input type="checkbox" ${selectedWishlist.has(r.id)?'checked':''} onchange="toggleSelectRow(${r.id}, this.checked)"></td>
      <td class="col-chk"><button class="cb-buy" onclick="markPurchased(${r.id})" title="Mark purchased — moves to inventory">🛒</button></td>
      <td class="col-num">${n}</td>
      <td class="col-desc">${e(r.name||'')}</td>
      <td class="col-src"><span class="source-pill">${e(r.source||'')}</span></td>
      <td class="col-qty">${r.qty||0}</td>
      <td class="col-price">${(r.price||0).toLocaleString()}</td>
      <td class="col-total">${((r.qty||0)*(r.price||0)).toLocaleString()}</td>
      <td class="col-buy">${buyBtn(r)}</td>
      <td class="col-crit">${r.critical?'<span class="crit-badge">⚠</span>':''}</td>
      <td class="col-act"><div class="row-actions">
        <button class="btn-icon" onclick="openEdit(${r.id})" title="Edit">✎</button>
        <button class="btn-icon del" onclick="openDel(${r.id})" title="Delete">🗑</button>
      </div></td>
    </tr>`;
  }).join('') || `<tr><td colspan="11"><div class="inline-empty"><div class="icon">🔍</div><p>No items match your filters</p></div></td></tr>`;

  const tc = items.reduce((s,r) => s+(r.qty||0)*(r.price||0), 0);
  const sc = invRows.reduce((s,r) => s+(r.qty||0)*(r.price||0), 0);
  document.getElementById('tblFooter').innerHTML =
    `<span>${items.length} item${items.length!==1?'s':''}</span>
     <span>Still needed <strong>${tc.toLocaleString()} LE</strong> · Already in inventory <strong>${sc.toLocaleString()} LE</strong></span>`;

  updateBulkBar();

  ['pos','name','source','qty','price','total'].forEach(col => {
    const el = document.getElementById('sa-'+col);
    if (el) el.textContent = col===sortCol ? (sortDir===1?'↑':'↓') : '';
  });
  document.querySelectorAll('.data-table th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow && arrow.id==='sa-'+sortCol) th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  });
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else {sortCol=col; sortDir=1;}
  renderItems();
}

/* ═══════════════════════════════════════════════════════
   INVENTORY TABLE
═══════════════════════════════════════════════════════ */
function renderInventory() {
  const search = (document.getElementById('iSearch')?.value||'').toLowerCase();
  const fCat   = document.getElementById('iCat')?.value || '';
  const fSrc   = document.getElementById('iSource')?.value || '';

  let items = invRows.map((r,i) => ({...r, _idx:i}));
  if (search) items = items.filter(r =>
    (r.name||'').toLowerCase().includes(search) ||
    (r.notes||'').toLowerCase().includes(search) ||
    (r.source||'').toLowerCase().includes(search));
  if (fCat) items = items.filter(r => r.category === fCat);
  if (fSrc) { const g = SOURCE_GROUPS.find(g=>g.value===fSrc); if(g) items=items.filter(r=>g.match(r.source||'')); }

  if (invSortCol) {
    items.sort((a, b) => {
      let av, bv;
      if      (invSortCol==='id')     { av=a.id||0;         bv=b.id||0; }
      else if (invSortCol==='name')   { av=a.name||'';      bv=b.name||''; }
      else if (invSortCol==='source') { av=a.source||'';    bv=b.source||''; }
      else if (invSortCol==='qty')    { av=a.qty||0;        bv=b.qty||0; }
      else if (invSortCol==='price')  { av=a.price||0;      bv=b.price||0; }
      else if (invSortCol==='total')  { av=(a.qty||0)*(a.price||0); bv=(b.qty||0)*(b.price||0); }
      if (typeof av==='string') return invSortDir*av.localeCompare(bv);
      return invSortDir*(av-bv);
    });
  }

  document.getElementById('invCountBadge').textContent = `${items.length} in inventory`;

  let n=0;
  document.getElementById('inventoryTableBody').innerHTML = items.map(r => {
    n++;
    return `<tr>
      <td class="col-num">${n}</td>
      <td class="col-desc">${e(r.name||'')}</td>
      <td class="col-src"><span class="source-pill">${e(r.source||'')}</span></td>
      <td class="col-qty">${r.qty||0}</td>
      <td class="col-price">${(r.price||0).toLocaleString()}</td>
      <td class="col-total">${((r.qty||0)*(r.price||0)).toLocaleString()}</td>
      <td class="col-act"><div class="row-actions">
        <button class="btn-icon" onclick="openEdit(${r.id},'inventory')" title="Edit">✎</button>
        <button class="btn-icon del" onclick="openDel(${r.id},'inventory')" title="Delete">🗑</button>
      </div></td>
    </tr>`;
  }).join('') || `<tr><td colspan="7"><div class="inline-empty"><div class="icon">📦</div><p>Nothing in your inventory yet — mark a wishlist item as purchased to move it here, or add one directly</p></div></td></tr>`;

  const tc = items.reduce((s,r) => s+(r.qty||0)*(r.price||0), 0);
  document.getElementById('invTblFooter').innerHTML =
    `<span>${items.length} item${items.length!==1?'s':''}</span>
     <span>Total value <strong>${tc.toLocaleString()} LE</strong></span>`;

  ['id','name','source','qty','price','total'].forEach(col => {
    const el = document.getElementById('isa-'+col);
    if (el) el.textContent = col===invSortCol ? (invSortDir===1?'↑':'↓') : '';
  });
  document.querySelectorAll('#tab-inventory .data-table th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow && arrow.id==='isa-'+invSortCol) th.classList.add(invSortDir===1?'sorted-asc':'sorted-desc');
  });
}

function invSortBy(col) {
  if (invSortCol===col) invSortDir*=-1; else {invSortCol=col; invSortDir=1;}
  renderInventory();
}

/* ═══════════════════════════════════════════════════════
   TRASH TABLE — deleted items archive
═══════════════════════════════════════════════════════ */
function renderTrash() {
  const body = document.getElementById('trashTableBody');
  if (!body) return;

  let n=0;
  body.innerHTML = delRows.map(r => {
    n++;
    const when = r.deleted_at ? new Date(r.deleted_at).toLocaleString() : '';
    const from = r.source_table === 'inventory' ? '📦 Inventory' : '🛒 Wishlist';
    return `<tr>
      <td class="col-num">${n}</td>
      <td class="col-desc">${e(r.name||'')}</td>
      <td class="col-src"><span class="source-pill">${from}</span></td>
      <td class="col-qty">${r.qty||0}</td>
      <td class="col-price">${(r.price||0).toLocaleString()}</td>
      <td class="col-total">${((r.qty||0)*(r.price||0)).toLocaleString()}</td>
      <td class="col-src" style="font-size:11px;color:var(--text3)">${when}</td>
      <td class="col-act"><div class="row-actions">
        <button class="btn-icon" onclick="restoreItem(${r.id})" title="Restore">↩</button>
        <button class="btn-icon del" onclick="purgeItem(${r.id})" title="Delete forever">🗑</button>
      </div></td>
    </tr>`;
  }).join('') || `<tr><td colspan="8"><div class="inline-empty"><div class="icon">🗑</div><p>Trash is empty — deleted items land here so you can restore them later</p></div></td></tr>`;

  document.getElementById('trashCountBadge').textContent = `${delRows.length} deleted item${delRows.length!==1?'s':''}`;
  const tc = delRows.reduce((s,r) => s+(r.qty||0)*(r.price||0), 0);
  document.getElementById('trashTblFooter').innerHTML =
    `<span>${delRows.length} item${delRows.length!==1?'s':''}</span>
     <span>Value <strong>${tc.toLocaleString()} LE</strong></span>`;
}

/* ═══════════════════════════════════════════════════════
   CRUD — ADD / EDIT (wishlist)
═══════════════════════════════════════════════════════ */
function populateStoreDropdowns(selectedSource, selectedLabel) {
  const srcSel   = document.getElementById('fSourceModal');
  const labelSel = document.getElementById('fBuyLabel');
  const opts = STORES.map(s =>
    `<option value="${e(s.source)}" data-label="${e(s.label)}">${e(s.source)}</option>`
  ).join('');
  const labelOpts = ['', ...STORES.map(s => s.label)].map(l =>
    `<option value="${e(l)}">${l || '(none)'}</option>`
  ).join('');
  srcSel.innerHTML   = opts;
  labelSel.innerHTML = labelOpts;
  if (selectedSource) srcSel.value   = selectedSource;
  if (selectedLabel)  labelSel.value = selectedLabel;
}

function syncBuyLabel() {
  const src   = document.getElementById('fSourceModal').value;
  const store = STORES.find(s => s.source === src);
  if (store) document.getElementById('fBuyLabel').value = store.label;
}

function syncSource() {
  const label = document.getElementById('fBuyLabel').value;
  const store = STORES.find(s => s.label === label);
  if (store) document.getElementById('fSourceModal').value = store.source;
}

function checkInventoryMatch() {
  const hint = document.getElementById('fNameHint');
  if (editTarget === 'inventory') { hint.textContent = ''; return; }
  const match = findInventoryMatch(document.getElementById('fName').value);
  hint.textContent = match ? `📦 You already have ${match.qty} of these in your inventory` : '';
}

function openAdd(target = 'wishlist') {
  editId = null;
  editTarget = target;
  const isInv = target === 'inventory';
  document.getElementById('editModalInner').classList.toggle('inventory-mode', isInv);
  document.getElementById('editTitle').textContent = isInv ? 'Add Inventory Item' : 'Add Item';
  document.getElementById('saveBtn').textContent   = 'Add Item';
  document.getElementById('editForm').reset();
  document.getElementById('fNameHint').textContent = '';
  populateStoreDropdowns();
  document.getElementById('editModal').classList.add('open');
}

function openEdit(id, target = 'wishlist') {
  editId = id;
  editTarget = target;
  const isInv = target === 'inventory';
  const r = (isInv ? invRows : rows).find(r=>r.id===id); if(!r) return;
  document.getElementById('editModalInner').classList.toggle('inventory-mode', isInv);
  document.getElementById('editTitle').textContent    = isInv ? 'Edit Inventory Item' : 'Edit Item';
  document.getElementById('saveBtn').textContent      = 'Save Changes';
  document.getElementById('fName').value              = r.name||'';
  document.getElementById('fCatInput').value          = r.category||'';
  populateStoreDropdowns(r.source||'', r.buy_label||'');
  document.getElementById('fQty').value               = r.qty||1;
  document.getElementById('fPrice').value             = r.price||0;
  document.getElementById('fNotes').value             = r.notes||'';
  document.getElementById('fBuyUrl').value            = r.buy_url||'';
  document.getElementById('fBuyLabel').value          = r.buy_label||'';
  document.getElementById('fCritical').checked        = r.critical||false;
  document.getElementById('fNameHint').textContent    = '';
  document.getElementById('editModal').classList.add('open');
}

async function saveItem(ev) {
  ev.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const isInv = editTarget === 'inventory';

  const payload = isInv ? {
    name:        document.getElementById('fName').value.trim(),
    category:    document.getElementById('fCatInput').value.trim(),
    source:      document.getElementById('fSourceModal').value,
    qty:         parseInt(document.getElementById('fQty').value)||1,
    price:       parseFloat(document.getElementById('fPrice').value)||0,
    notes:       document.getElementById('fNotes').value.trim(),
  } : {
    name:        document.getElementById('fName').value.trim(),
    category:    document.getElementById('fCatInput').value.trim(),
    source:      document.getElementById('fSourceModal').value,
    qty:         parseInt(document.getElementById('fQty').value)||1,
    price:       parseFloat(document.getElementById('fPrice').value)||0,
    notes:       document.getElementById('fNotes').value.trim(),
    buy_url:     document.getElementById('fBuyUrl').value.trim(),
    buy_label:   document.getElementById('fBuyLabel').value.trim(),
    critical:    document.getElementById('fCritical').checked,
  };

  try {
    if (editId) {
      await (isInv ? invUpdate(editId, payload) : dbUpdate(editId, payload));
      toast('Item updated');
    } else {
      await (isInv ? invInsert(payload) : dbInsert(payload));
      toast('Item added');
    }
    closeEdit();
    await loadItems();
  } catch(err) {
    toast('Save failed: '+err.message, 'red');
  } finally {
    btn.disabled = false;
    btn.textContent = editId ? 'Save Changes' : 'Add Item';
  }
}

function closeEdit()    { document.getElementById('editModal').classList.remove('open'); }

/* ── DELETE ─────────────────────────────────────────── */
function openDel(id, target = 'wishlist') {
  delId = id;
  delTarget = target;
  const r = (target === 'inventory' ? invRows : rows).find(r=>r.id===id);
  document.getElementById('delDesc').textContent = r?.name||'';
  document.getElementById('delModal').classList.add('open');
}

async function confirmDel() {
  if (!delId) return;
  try {
    await (delTarget === 'inventory' ? invDelete(delId) : dbDelete(delId));
    toast('Deleted', 'red');
    delId = null;
    closeDel();
    await loadItems();
  } catch(err) {
    toast('Delete failed: '+err.message, 'red');
  }
}

function closeDel()    { document.getElementById('delModal').classList.remove('open'); }
function closeDelIf(e) { if(e.target===document.getElementById('delModal')) closeDel(); }

/* ═══════════════════════════════════════════════════════
   BUY BUTTON  (uses buy_url / buy_label from Supabase)
═══════════════════════════════════════════════════════ */
function buyBtn(row) {
  const label = row.buy_label || '';
  const url   = row.buy_url   || '';
  if (!label && !url) return '';
  const cls = buyBtnClass(label, url);
  if (url) return `<a href="${e(url)}" target="_blank" rel="noopener" class="buy-btn ${cls}">${e(label || url)}</a>`;
  return `<span class="buy-btn ${cls}">${e(label)}</span>`;
}

function buyBtnClass(label, url) {
  const s = (label + ' ' + url).toLowerCase();
  if (/circuits-elec/i.test(s))             return 'green';
  if (/ram-e-shop|ram electronics/i.test(s)) return 'teal';
  if (/uge-one|uge electronics/i.test(s))    return 'slate';
  if (/microohm/i.test(s))                   return 'red';
  if (/hdelectronics|hd electronics/i.test(s)) return 'teal';
  if (/pharmacy/i.test(s))                   return 'purple';
  if (/print shop/i.test(s))                 return 'navy';
  if (/owned/i.test(s))                      return 'grey';
  return 'slate';
}

/* ═══════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════ */
function showReport(type) {
  const now = new Date().toLocaleDateString('en-GB');
  let html = '';

  if (type==='shopping') {
    const rem = rows;
    const byStore = {};
    rem.forEach(r=>{const k=r.source||'Unknown';if(!byStore[k])byStore[k]=[];byStore[k].push(r);});
    const grand = rem.reduce((s,r)=>s+(r.qty||0)*(r.price||0),0);
    html = `<div class="rpt-section">
      <div class="rpt-title">🛒 Shopping List — by Store</div>
      <div class="rpt-date">Generated ${now} · ${rem.length} items remaining</div>
      ${Object.entries(byStore).map(([store,its])=>{
        const st=its.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
        return `<div class="rpt-group">
          <div class="rpt-group-title">📍 ${e(store)}</div>
          <table class="rpt-table">
            <thead><tr><th>Name</th><th class="td-num">Qty</th><th class="td-num">Unit LE</th><th class="td-num">Total LE</th></tr></thead>
            <tbody>
              ${its.map(i=>`<tr>
                <td>${e(i.name||'')}${i.critical?' <span class="crit-badge">⚠</span>':''}</td>
                <td class="td-num">${i.qty||0}</td>
                <td class="td-num">${(i.price||0).toLocaleString()}</td>
                <td class="td-num">${((i.qty||0)*(i.price||0)).toLocaleString()}</td>
              </tr>`).join('')}
              <tr class="rpt-subtotal"><td colspan="3"><strong>Subtotal — ${e(store)}</strong></td><td class="td-num"><strong>${st.toLocaleString()} LE</strong></td></tr>
            </tbody>
          </table>
        </div>`;
      }).join('')}
      <div class="rpt-grand">Grand total remaining: <strong>${grand.toLocaleString()} LE</strong></div>
    </div>`;

  } else if (type==='cost') {
    const all = [...rows.map(r=>({...r,bought:false})), ...invRows.map(r=>({...r,bought:true}))];
    const catG={};
    all.forEach(r=>{const k=r.category||'—';if(!catG[k])catG[k]=[];catG[k].push(r);});
    const grand=all.reduce((s,r)=>s+(r.qty||0)*(r.price||0),0);
    html = `<div class="rpt-section">
      <div class="rpt-title">💰 Cost Breakdown — by Category</div>
      <div class="rpt-date">Generated ${now} · ${all.length} total items (wishlist + inventory)</div>
      <table class="rpt-table">
        <thead><tr><th>Category</th><th class="td-num">Items</th><th class="td-num">In Inventory</th><th class="td-num">Total LE</th><th class="td-num">Still Needed LE</th></tr></thead>
        <tbody>
          ${Object.entries(catG).map(([cat,its])=>{
            const total=its.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
            const remaining=its.filter(i=>!i.bought).reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
            return `<tr><td>${cat}</td><td class="td-num">${its.length}</td><td class="td-num">${its.filter(i=>i.bought).length}</td><td class="td-num">${total.toLocaleString()}</td><td class="td-num">${remaining.toLocaleString()}</td></tr>`;
          }).join('')}
          <tr class="rpt-subtotal">
            <td><strong>TOTAL</strong></td>
            <td class="td-num"><strong>${all.length}</strong></td>
            <td class="td-num"><strong>${invRows.length}</strong></td>
            <td class="td-num"><strong>${grand.toLocaleString()}</strong></td>
            <td class="td-num"><strong>${rows.reduce((s,r)=>s+(r.qty||0)*(r.price||0),0).toLocaleString()}</strong></td>
          </tr>
        </tbody>
      </table>
    </div>`;

  } else if (type==='critical') {
    const crit=rows.filter(r=>r.critical);
    html=`<div class="rpt-section">
      <div class="rpt-title">⚠ Critical Items — Unpurchased</div>
      <div class="rpt-date">Generated ${now} · ${crit.length} critical item${crit.length!==1?'s':''} remaining</div>
      ${crit.length===0?'<p style="color:var(--green);font-weight:600">All critical items purchased ✓</p>':`
      <table class="rpt-table">
        <thead><tr><th>Name</th><th>Category</th><th>Source</th><th class="td-num">Total LE</th></tr></thead>
        <tbody>${crit.map(r=>`<tr>
          <td>${e(r.name||'')}</td><td>${e(r.category||'')}</td><td>${e(r.source||'')}</td>
          <td class="td-num">${((r.qty||0)*(r.price||0)).toLocaleString()}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div class="rpt-grand">Total critical remaining: <strong>${crit.reduce((s,r)=>s+(r.qty||0)*(r.price||0),0).toLocaleString()} LE</strong></div>`}
    </div>`;
  }

  document.getElementById('rptOutput').innerHTML = html;
  setTab('reports');
}


/* ═══════════════════════════════════════════════════════
   COPY SCHEMA SQL
═══════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════
   HTML ESCAPE
═══════════════════════════════════════════════════════ */
function e(str) {
  return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
function toast(msg, type='green') {
  const el = document.createElement('div');
  el.className = 'toast' + (type!=='green' ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toastStack').appendChild(el);
  setTimeout(() => el.remove(), 3400);
}
</script>
